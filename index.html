<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Finger Trips</title>
<link rel="stylesheet" href="style.css">
  
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #f2eee8;
      font-family: Arial, sans-serif;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 80px;
      letter-spacing: -3px;
      margin: 0;
    }

    p {
      font-size: 20px;
      color: #b8b0a8;
    }

    a {
      color: #f2eee8;
      text-decoration: none;
      border: 1px solid #f2eee8;
      padding: 12px 22px;
      display: inline-block;
      margin-top: 24px;
    }
  </style>
</head>

<body>
  <section class="hero">
    <div>
      <h1>Finger Trips</h1>
      <p>House music, DJ sets & original productions.</p>
      <a href="https://soundcloud.com/" target="_blank">Listen</a>
    </div>
  </section>
</body>
</html>
